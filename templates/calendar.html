{% extends "base.html" %}

{% block content %}
<style>
    /* Override FullCalendar yellow "today" highlight */
    .fc-day-today {
        background-color: rgba(10, 102, 194, 0.04) !important;
        position: relative;
    }
    .fc-day-today::after {
        content: '';
        position: absolute;
        top: 2px; right: 2px; bottom: 2px; left: 2px;
        border: 2px solid rgba(10, 102, 194, 0.1);
        border-radius: 8px;
        pointer-events: none;
    }
    .dark .fc-day-today {
        background-color: rgba(10, 102, 194, 0.1) !important;
    }
    
    /* Premium Mesh Gradient Background for the card */
    .calendar-premium-bg {
        background-color: #ffffff;
        background-image: 
            radial-gradient(at 0% 0%, rgba(10, 102, 194, 0.03) 0px, transparent 50%),
            radial-gradient(at 100% 0%, rgba(10, 102, 194, 0.05) 0px, transparent 50%);
    }
    .dark .calendar-premium-bg {
        background-color: #1e293b;
        background-image: 
            radial-gradient(at 0% 0%, rgba(10, 102, 194, 0.1) 0px, transparent 50%),
            radial-gradient(at 100% 0%, rgba(10, 102, 194, 0.05) 0px, transparent 50%);
    }

    /* Smooth transitions for heatmap classes */
    .fc-daygrid-day {
        transition: all 0.3s ease;
    }
</style>
<div class="animate-fade-in flex h-[calc(100vh-120px)] gap-6 overflow-hidden">
    <!-- Left Sidebar: Ideas Parking Lot -->
    <aside id="ideasBin"
        class="w-64 flex-shrink-0 bg-white dark:bg-slate-800 rounded-2xl shadow-sm border border-slate-100 dark:border-slate-700 flex flex-col transition-all duration-300">
        <div class="p-4 border-b border-slate-100 dark:border-slate-700 flex items-center justify-between">
            <h3 class="font-bold text-slate-800 dark:text-white flex items-center gap-2">
                <i class="fa-solid fa-lightbulb text-blue-400"></i> Ideas Bin
            </h3>
            <button id="toggleIdeas" class="text-slate-400 hover:text-slate-600 dark:hover:text-slate-200">
                <i class="fa-solid fa-chevron-left"></i>
            </button>
        </div>
        <div class="p-4 flex-1 overflow-y-auto custom-scrollbar" id="ideasContainer">
            <div class="flex flex-col gap-3">
                <!-- Ideas will be populated here -->
                <button id="addIdeaBtn"
                    class="w-full py-3 border-2 border-dashed border-slate-200 dark:border-slate-700 rounded-xl text-slate-400 hover:text-primary hover:border-primary transition-all flex items-center justify-center gap-2 text-sm font-medium">
                    <i class="fa-solid fa-plus"></i> Drop an idea here
                </button>
            </div>
        </div>
    </aside>

    <!-- Center: Calendar Area -->
    <div class="flex-1 flex flex-col gap-6 overflow-y-auto custom-scrollbar">
        <!-- Quick Add Bar & AI Commands -->
        <div class="flex flex-col gap-3">
            <div
                class="bg-white dark:bg-slate-800 rounded-2xl shadow-sm border border-slate-100 dark:border-slate-700 p-2 flex items-center gap-3">
                <div class="flex-1 flex items-center gap-2 px-3 py-2 bg-slate-50 dark:bg-slate-900/50 rounded-xl">
                    <i class="fa-solid fa-magic-wand-sparkles text-primary"></i>
                    <input type="text" id="quickAddInput"
                        placeholder="Quick add: 'LinkedIn post about AI' on Friday at 9am..."
                        class="bg-transparent border-none outline-none w-full text-sm">
                </div>
                <button id="quickAddBtn"
                    class="bg-primary text-white px-6 py-2 rounded-xl font-semibold hover:bg-blue-700 transition-all text-sm">
                    Add to Calendar
                </button>
            </div>

            <div class="flex gap-2">
                <button onclick="handleAICommand('fill-month')"
                    class="flex-1 py-2 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl text-[10px] font-bold uppercase tracking-wider text-slate-500 hover:text-primary hover:border-primary transition-all flex items-center justify-center gap-2">
                    <i class="fa-solid fa-calendar-plus text-primary"></i> Fill Month
                </button>
                <button onclick="handleAICommand('balance')"
                    class="flex-1 py-2 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl text-[10px] font-bold uppercase tracking-wider text-slate-500 hover:text-primary hover:border-primary transition-all flex items-center justify-center gap-2">
                    <i class="fa-solid fa-scale-balanced text-primary"></i> Balance Schedule
                </button>
                <button onclick="handleAICommand('theme-week')"
                    class="flex-1 py-2 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl text-[10px] font-bold uppercase tracking-wider text-slate-500 hover:text-primary hover:border-primary transition-all flex items-center justify-center gap-2">
                    <i class="fa-solid fa-layer-group text-primary"></i> Theme Week
                </button>
            </div>
        </div>


        <div
            class="flex-1 calendar-premium-bg dark:bg-slate-800 rounded-2xl shadow-sm border border-slate-100 dark:border-slate-700 p-6 overflow-y-auto custom-scrollbar relative">
            <div class="flex justify-between items-center mb-6">
                <div class="flex items-center gap-2">
                    <button onclick="navCalendar('prev')" class="p-2 hover:bg-slate-100 rounded-lg"><i
                            class="fa-solid fa-chevron-left"></i></button>
                    <button onclick="navCalendar('next')" class="p-2 hover:bg-slate-100 rounded-lg"><i
                            class="fa-solid fa-chevron-right"></i></button>
                    <button onclick="navCalendar('today')"
                        class="px-4 py-2 bg-slate-100 rounded-lg text-sm font-semibold">Today</button>
                </div>
                <h2 id="calendarTitle" class="text-xl font-bold"></h2>
                <div class="flex bg-slate-100 p-1 rounded-xl">
                    <button onclick="changeView('dayGridMonth')"
                        class="view-btn px-4 py-1.5 rounded-lg text-xs font-bold bg-primary text-white">Month</button>
                    <button onclick="changeView('timeGridWeek')"
                        class="view-btn px-4 py-1.5 rounded-lg text-xs font-bold text-slate-500">Week</button>
                    <button onclick="changeView('listMonth')"
                        class="view-btn px-4 py-1.5 rounded-lg text-xs font-bold text-slate-500">List</button>
                </div>
            </div>
            <div id="calendar" class="min-h-[600px]"></div>

            <!-- Floating Context Menu (Hidden by default) -->
            <div id="contextMenu"
                class="fixed z-[100] hidden bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl shadow-xl py-2 w-48 animate-fade-in">
                <button
                    class="w-full text-left px-4 py-2 hover:bg-slate-50 dark:hover:bg-slate-700 flex items-center gap-2 text-sm"
                    onclick="handleContextAction('rewrite')">
                    <i class="fa-solid fa-wand-magic-sparkles text-purple-500"></i> AI Rewrite
                </button>
                <button
                    class="w-full text-left px-4 py-2 hover:bg-slate-50 dark:hover:bg-slate-700 flex items-center gap-2 text-sm"
                    onclick="handleContextAction('adjust')">
                    <i class="fa-solid fa-sliders text-blue-500"></i> Adjust Tone
                </button>
                <div class="my-1 border-t border-slate-100 dark:border-slate-700"></div>
                <button
                    class="w-full text-left px-4 py-2 hover:bg-slate-50 dark:hover:bg-slate-700 flex items-center gap-2 text-sm text-red-500"
                    onclick="handleContextAction('delete')">
                    <i class="fa-solid fa-trash"></i> Delete Post
                </button>
            </div>
        </div>
    </div>

    <!-- Right Sidebar: Side Panel Editor (Slide-out) -->
    <aside id="postEditorPanel"
        class="fixed right-0 top-[72px] bottom-0 w-[400px] bg-white dark:bg-slate-800 border-l border-slate-200 dark:border-slate-700 shadow-2xl transform translate-x-full transition-transform duration-300 z-50 flex flex-col">
        <div
            class="px-6 py-4 border-b border-slate-100 dark:border-slate-700 flex items-center justify-between bg-slate-50/50 dark:bg-slate-900/50">
            <h3 class="text-lg font-bold flex items-center gap-2">
                <i class="fa-solid fa-pen-to-square text-primary"></i> Edit Post
            </h3>
            <button id="closeEditor"
                class="text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 p-2 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-700 transition-all">
                <i class="fa-solid fa-xmark text-xl"></i>
            </button>
        </div>

        <div class="flex-1 overflow-y-auto p-6 custom-scrollbar">
            <form id="editorForm" class="space-y-6">
                <input type="hidden" id="editorPostId">

                <div>
                    <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2">Topic /
                        Title</label>
                    <input type="text" id="editorTopic"
                        class="w-full px-4 py-3 rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900 focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all text-sm font-medium"
                        placeholder="e.g. AI Strategy 2024">
                </div>

                <div>
                    <div class="flex items-center justify-between mb-2">
                        <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300">Content</label>

                        <span id="charCount" class="text-[10px] uppercase font-bold text-slate-400">0 / 3000</span>
                    </div>
                    <textarea id="editorContent"
                        class="w-full h-64 px-4 py-3 rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900 focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all resize-none text-sm leading-relaxed"
                        placeholder="Write your post here..."></textarea>

                    <div class="mt-2 flex gap-2 overflow-x-auto pb-2 scrollbar-hide">
                        <button type="button" onclick="insertPlaceholder('/hook')"
                            class="px-3 py-1 bg-slate-100 dark:bg-slate-700 rounded-full text-[10px] font-bold text-slate-600 dark:text-slate-400 hover:bg-primary hover:text-white transition-all uppercase whitespace-nowrap">/hook</button>
                        <button type="button" onclick="insertPlaceholder('/expand')"
                            class="px-3 py-1 bg-slate-100 dark:bg-slate-700 rounded-full text-[10px] font-bold text-slate-600 dark:text-slate-400 hover:bg-primary hover:text-white transition-all uppercase whitespace-nowrap">/expand</button>
                        <button type="button" onclick="insertPlaceholder('/hashtags')"
                            class="px-3 py-1 bg-slate-100 dark:bg-slate-700 rounded-full text-[10px] font-bold text-slate-600 dark:text-slate-400 hover:bg-primary hover:text-white transition-all uppercase whitespace-nowrap">/hashtags</button>
                        <button type="button" onclick="insertPlaceholder('/cta')"
                            class="px-3 py-1 bg-slate-100 dark:bg-slate-700 rounded-full text-[10px] font-bold text-slate-600 dark:text-slate-400 hover:bg-primary hover:text-white transition-all uppercase whitespace-nowrap">/cta</button>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">Scheduled
                            Time</label>
                        <input type="datetime-local" id="editorTime"
                            class="w-full px-3 py-2 rounded-lg border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900 text-sm focus:ring-2 focus:ring-primary outline-none">
                    </div>
                    <div>
                        <label
                            class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">Status</label>
                        <select id="editorStatus"
                            class="w-full px-3 py-2 rounded-lg border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900 text-sm focus:ring-2 focus:ring-primary outline-none">
                            <option value="Draft">Draft</option>
                            <option value="Scheduled">Scheduled</option>
                            <option value="Pending Approval">Pending Approval</option>
                            <option value="Published">Published</option>
                        </select>
                    </div>
                </div>

                <div
                    class="bg-blue-50 dark:bg-blue-900/20 p-4 rounded-xl border border-blue-100 dark:border-blue-800/30">
                    <h4
                        class="text-xs font-bold text-blue-600 dark:text-blue-400 uppercase mb-2 flex items-center gap-2">
                        <i class="fa-solid fa-chart-line"></i> AI Insights
                    </h4>
                    <p id="aiInsight" class="text-xs text-blue-700/80 dark:text-blue-300/80 leading-relaxed italic">
                        Select a post or write content to see AI engagement predictions.
                    </p>
                </div>
            </form>
        </div>

        <div class="p-6 border-t border-slate-100 dark:border-slate-700 flex flex-col gap-3">
            <button type="button" id="aiRewriteBtn"
                class="w-full bg-slate-800 dark:bg-slate-700 text-white font-bold py-3 rounded-xl shadow-lg hover:bg-slate-900 transition-all flex items-center justify-center gap-2 text-sm">
                <i class="fa-solid fa-wand-magic-sparkles"></i> AI Optimize
            </button>
            <div class="flex gap-3">
                <button type="button" id="deletePostBtn" onclick="deletePost()"
                    class="px-4 py-3 rounded-xl border border-red-100 text-red-500 hover:bg-red-50 dark:border-red-900/30 dark:hover:bg-red-900/20 transition-all">
                    <i class="fa-solid fa-trash"></i>
                </button>

                <button type="submit" form="editorForm"
                    class="flex-1 bg-primary hover:bg-blue-700 text-white font-bold py-3 rounded-xl shadow-lg shadow-blue-500/30 transition-all text-sm">
                    Save Changes
                </button>
            </div>
        </div>
    </aside>
</div>

<!-- ═══════════════════════════════════════════════════════
     POST PREVIEW MODAL
     Opens when any calendar event is clicked
════════════════════════════════════════════════════════ -->
<div id="postPreviewModal"
    class="fixed inset-0 z-[200] hidden items-center justify-center bg-black/60 backdrop-blur-sm p-4"
    onclick="if(event.target===this) closePostPreview()">

    <div class="relative w-full max-w-[520px] max-h-[90vh] flex flex-col bg-white dark:bg-slate-800 rounded-2xl shadow-2xl border border-slate-200 dark:border-slate-700 overflow-hidden animate-fade-in">

        <!-- Modal header -->
        <div class="flex items-center justify-between px-5 py-4 border-b border-slate-100 dark:border-slate-700 shrink-0">
            <div class="flex items-center gap-2">
                <span id="previewStatusBadge"
                    class="inline-flex items-center gap-1.5 px-3 py-1 rounded-full text-xs font-bold">
                </span>
                <span id="previewTopic" class="text-sm font-semibold text-slate-700 dark:text-slate-200 truncate max-w-[240px]"></span>
            </div>
            <button onclick="closePostPreview()"
                class="p-2 rounded-lg text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 hover:bg-slate-100 dark:hover:bg-slate-700 transition-all">
                <i class="fa-solid fa-xmark text-lg"></i>
            </button>
        </div>

        <!-- Scrollable LinkedIn-style card -->
        <div class="flex-1 overflow-y-auto custom-scrollbar">

            <!-- LinkedIn post header -->
            <div class="p-4 flex gap-3">
                <div class="w-11 h-11 rounded-full bg-slate-200 overflow-hidden shrink-0">
                    <img id="previewAvatar" src="https://ui-avatars.com/api/?name=User&background=0a66c2&color=fff"
                        alt="Avatar" class="w-full h-full object-cover">
                </div>
                <div class="flex-1 min-w-0">
                    <div id="previewAuthor" class="font-bold text-[15px] text-slate-800 dark:text-white">You</div>
                    <div class="text-[12px] text-slate-500">AI &amp; Machine Learning Enthusiast</div>
                    <div class="text-[12px] text-slate-500 flex items-center gap-1 mt-[2px]">
                        <span id="previewTime">—</span>
                        <span>•</span>
                        <i class="fa-solid fa-earth-americas text-[10px]"></i>
                    </div>
                </div>
            </div>

            <!-- Post text -->
            <div id="previewText"
                class="px-4 pb-4 text-[14px] text-slate-800 dark:text-slate-100 leading-relaxed whitespace-pre-wrap">
            </div>

            <!-- Post image -->
            <div id="previewImageWrap" class="w-full bg-slate-100 dark:bg-slate-700 hidden">
                <img id="previewImage" src="" alt="Post image" class="w-full object-cover max-h-[400px]">
            </div>

            <!-- Engagement bar -->
            <div class="px-4 py-2 border-t border-slate-100 dark:border-slate-700 flex justify-between items-center text-[12px] text-slate-500">
                <div class="flex items-center gap-1">
                    <i class="fa-solid fa-thumbs-up text-blue-500 bg-blue-100 rounded-full p-1 text-[10px]"></i>
                    <i class="fa-solid fa-heart text-red-500 bg-red-100 rounded-full p-1 text-[10px]"></i>
                    <span class="ml-1">—</span>
                </div>
                <div>— comments</div>
            </div>

            <!-- LinkedIn action row -->
            <div class="px-2 py-1 flex justify-between border-t border-slate-100 dark:border-slate-700">
                <button class="flex items-center gap-1.5 px-3 py-3 hover:bg-slate-100 dark:hover:bg-slate-700 rounded text-slate-500 w-1/4 justify-center transition-colors text-xs font-semibold">
                    <i class="fa-regular fa-thumbs-up text-base"></i> Like
                </button>
                <button class="flex items-center gap-1.5 px-3 py-3 hover:bg-slate-100 dark:hover:bg-slate-700 rounded text-slate-500 w-1/4 justify-center transition-colors text-xs font-semibold">
                    <i class="fa-regular fa-comment text-base"></i> Comment
                </button>
                <button class="flex items-center gap-1.5 px-3 py-3 hover:bg-slate-100 dark:hover:bg-slate-700 rounded text-slate-500 w-1/4 justify-center transition-colors text-xs font-semibold">
                    <i class="fa-solid fa-retweet text-base"></i> Repost
                </button>
                <button class="flex items-center gap-1.5 px-3 py-3 hover:bg-slate-100 dark:hover:bg-slate-700 rounded text-slate-500 w-1/4 justify-center transition-colors text-xs font-semibold">
                    <i class="fa-regular fa-paper-plane text-base"></i> Send
                </button>
            </div>
        </div>

        <!-- Action footer -->
        <div class="shrink-0 px-5 py-4 border-t border-slate-100 dark:border-slate-700 flex gap-3">
            <!-- Delete -->
            <button id="previewDeleteBtn"
                class="px-4 py-2.5 rounded-xl border border-red-100 dark:border-red-900/30 text-red-500 hover:bg-red-50 dark:hover:bg-red-900/20 transition-all text-sm font-semibold flex items-center gap-2">
                <i class="fa-solid fa-trash"></i> Delete
            </button>
            <!-- Edit -->
            <button id="previewEditBtn"
                class="flex-1 py-2.5 rounded-xl border border-slate-200 dark:border-slate-700 text-slate-700 dark:text-slate-200 hover:bg-slate-50 dark:hover:bg-slate-700 transition-all text-sm font-semibold flex items-center justify-center gap-2">
                <i class="fa-solid fa-pen-to-square"></i> Edit Post
            </button>
            <!-- Publish Now (only for non-published) -->
            <button id="previewPublishBtn"
                class="flex-1 py-2.5 rounded-xl bg-[#0a66c2] hover:bg-[#004182] text-white transition-all text-sm font-semibold flex items-center justify-center gap-2 shadow-md shadow-blue-500/20">
                <i class="fa-brands fa-linkedin"></i> Publish Now
            </button>
        </div>
    </div>
</div>
{% endblock %}


{% block scripts %}
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js"></script>
<script src="{{ url_for('static', filename='js/calendar.js') }}"></script>
{% endblock %}
