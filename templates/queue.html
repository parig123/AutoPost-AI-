{% extends "base.html" %}

{% block content %}
<div class="animate-fade-in">
    <header class="mb-8 flex justify-between items-center">
        <div>
            <h2 class="text-3xl font-bold">Approval Queue</h2>
            <p class="text-slate-500 dark:text-slate-400 mt-1">Review, edit, and approve AI-generated posts before they go live.</p>
        </div>
        <div class="flex gap-3">
            <button class="px-4 py-2 border border-slate-200 dark:border-slate-600 rounded-lg hover:bg-slate-50 dark:hover:bg-slate-700 transition-colors text-sm font-semibold">
                Reject All
            </button>
            <button class="px-4 py-2 bg-primary text-white rounded-lg hover:bg-blue-700 transition-colors shadow-lg shadow-blue-500/20 text-sm font-semibold">
                Approve All
            </button>
        </div>
    </header>

    <div class="bg-white dark:bg-slate-800 rounded-2xl shadow-sm border border-slate-100 dark:border-slate-700 p-6 min-h-[400px] flex items-center justify-center">
        <div class="text-center">
             <div class="w-20 h-20 bg-slate-50 dark:bg-slate-700/50 rounded-full flex items-center justify-center mx-auto mb-4 text-emerald-500">
                <i class="fa-solid fa-check-double text-3xl"></i>
            </div>
            <h3 class="text-xl font-bold mb-2">All Caught Up!</h3>
            <p class="text-slate-500 dark:text-slate-400">There are no posts waiting for your approval right now.</p>
            <a href="/create" class="inline-block mt-6 px-6 py-2 bg-primary text-white font-medium rounded-lg hover:bg-blue-700 transition-colors">
                Generate a Post
            </a>
        </div>
    </div>
</div>
{% endblock %}
