<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoPost AI</title>
    <!-- Tailwind CSS (CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#0a66c2', /* linkedin blue */
                        secondary: '#004182', /* dark blue */
                        accent_success: '#10B981',
                        accent_error: '#F43F5E',
                        accent_warning: '#F59E0B',
                        bg_light: '#F8FAFC',
                        bg_dark: '#0F172A',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                        brand: ['"Imprint MT Shadow"', 'serif'],
                    }
                }
            }
        }
    </script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- FullCalendar CSS -->
    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/custom.css') }}">
</head>
<body class="bg-bg_light dark:bg-bg_dark text-slate-700 dark:text-slate-300 font-sans transition-colors duration-300 min-h-screen flex flex-col">
    
    <!-- Top Navigation -->
    <nav class="w-full bg-white/80 dark:bg-slate-900/80 backdrop-blur-md border-b border-slate-200 dark:border-slate-700 px-8 py-4 fixed top-0 z-40 flex items-center justify-between">
        <div class="flex items-center gap-3">
            <div class="w-8 h-8 rounded-full bg-primary flex items-center justify-center text-white font-bold text-lg">
                <i class="fa-brands fa-linkedin-in"></i>
            </div>
            <a href="/" class="text-lg font-brand font-normal tracking-tight">AutoPost <span class="text-primary">AI</span></a>
        </div>
        
        <div class="nav-links-container flex items-center gap-6 text-base">
            <a href="/dashboard" class="nav-link {% if request.path == '/dashboard' %}active{% endif %}">Dashboard</a>
            <a href="/create" class="nav-link {% if request.path == '/create' %}active{% endif %}">Create post</a>
            <a href="/calendar" class="nav-link {% if request.path == '/calendar' %}active{% endif %}">Calendar</a>
            <a href="/faq" class="nav-link {% if request.path == '/faq' %}active{% endif %}">FAQ</a>
            <a href="/settings" class="nav-link {% if request.path == '/settings' %}active{% endif %}">Settings</a>
            
            <div class="w-px h-6 bg-slate-300 dark:bg-slate-600 mx-2"></div>
            
            <button id="themeToggle" class="text-slate-500 hover:text-primary transition-colors">
                <i class="fa-solid fa-moon w-5 dark:hidden text-xl"></i>
                <i class="fa-solid fa-sun w-5 hidden dark:block text-xl"></i>
            </button>
            
            <div id="authSection" class="flex items-center gap-3">
                <!-- Populated by JS -->
                <a href="/login" class="px-4 py-2 bg-primary text-white font-medium rounded-lg hover:bg-blue-700 transition-colors text-sm">Login</a>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="flex-1 w-full max-w-7xl mx-auto p-8 pt-28">
        {% block content %}{% endblock %}
    </main>

    <!-- Global Toast Container -->
    <div id="toast-container" class="fixed top-6 right-6 z-50 flex flex-col gap-3"></div>

    <!-- Core Scripts -->
    <script src="{{ url_for('static', filename='js/api.js') }}"></script>
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
